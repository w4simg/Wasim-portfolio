<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Portfolio</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css">
  
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ── Login View ─────────────────────────────────────────────────────── -->
  <div id="login-view">
    <div class="login-box">
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" class="form-input" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-input" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
    </div>
  </div>

  <!-- ── Dashboard View ─────────────────────────────────────────────────── -->
  <div id="dashboard-view" style="display: none;">
    
    <!-- Mobile Sidebar Toggle -->
    <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>wasim.admin</h2>
      </div>
      <nav>
        <div class="nav-item active" data-target="view-projects">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Projects
        </div>
        <div class="nav-item" data-target="view-skills">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          Skills
        </div>
        <div class="nav-item logout-btn" id="logout-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Projects Section -->
      <section id="view-projects" class="view-section active">
        <div class="view-header">
          <h1>Manage Projects</h1>
          <button class="btn" id="btn-add-project" style="width: auto;">+ New Project</button>
        </div>
        <div class="admin-grid" id="admin-projects-grid">
          <!-- Projects injected here -->
        </div>
      </section>

      <!-- Skills Section -->
      <section id="view-skills" class="view-section">
        <div class="view-header">
          <h1>Manage Skills</h1>
          <button class="btn" id="btn-add-skill" style="width: auto;">+ New Skill</button>
        </div>
        <div class="admin-grid" id="admin-skills-grid">
          <!-- Skills injected here -->
        </div>
      </section>

    </main>
  </div>

  <!-- ── Modals ─────────────────────────────────────────────────────────── -->
  <!-- Project Modal -->
  <div class="modal" id="project-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="project-modal-title">Add Project</h2>
        <button class="modal-close" id="close-project-modal">&times;</button>
      </div>
      <form id="project-form">
        <input type="hidden" id="pf-id">
        
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="pf-title" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label>Category</label>
          <select id="pf-category" class="form-input">
            <option value="backend">Backend</option>
            <option value="fullstack">Fullstack</option>
            <option value="frontend">Frontend</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Short Description (for cards)</label>
          <input type="text" id="pf-desc" class="form-input" required maxlength="300">
        </div>
        
        <div class="form-group">
          <label>Tech Stack (comma separated)</label>
          <input type="text" id="pf-tech" class="form-input" required placeholder="Python, Django, PostgreSQL">
        </div>
        
        <div class="form-group">
          <label>GitHub URL</label>
          <input type="url" id="pf-github" class="form-input">
        </div>
        
        <div class="form-group">
          <label>Live URL (Optional)</label>
          <input type="url" id="pf-live" class="form-input">
        </div>
        
        <div style="margin-top: 24px;">
          <button type="submit" class="btn">Save Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Skill Modal -->
  <div class="modal" id="skill-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="skill-modal-title">Add Skill</h2>
        <button class="modal-close" id="close-skill-modal">&times;</button>
      </div>
      <form id="skill-form">
        <input type="hidden" id="sf-id">
        
        <div class="form-group">
          <label>Skill Name</label>
          <input type="text" id="sf-name" class="form-input" required placeholder="e.g. Python">
        </div>
        
        <div class="form-group">
          <label>Category</label>
          <select id="sf-category" class="form-input">
            <option value="backend">Backend</option>
            <option value="database">Database</option>
            <option value="frontend">Frontend</option>
            <option value="tools">Tools</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Proficiency Level (0-100)</label>
          <input type="number" id="sf-level" class="form-input" required min="0" max="100">
        </div>
        
        <div class="form-group">
          <label>Devicon Class (e.g. devicon-python-plain) <a href="https://devicon.dev" target="_blank" style="color: var(--accent-primary); font-size: 0.8rem; margin-left: 8px;">Browse Icons ↗</a></label>
          <input type="text" id="sf-icon" class="form-input" required>
        </div>
        
        <div style="margin-top: 24px;">
          <button type="submit" class="btn">Save Skill</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast">Message</div>

  <script src="js/admin.js"></script>
</body>
</html>
